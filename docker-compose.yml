services:
  db:
    container_name: db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ecosphere
      POSTGRES_PASSWORD: ecosphere
      POSTGRES_DB: ecosphere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosphere -d ecosphere"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    container_name: api
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ecosphere:ecosphere@db:5432/ecosphere
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Fix the mount target to match the absolute WORKDIR /app
      - ./backend:/app

volumes:
  pgdata:
